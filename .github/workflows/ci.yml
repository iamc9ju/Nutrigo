name: CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    name: Lint & Test Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Cache Turborepo
        uses: actions/cache@v3
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

  
      - name: Check Formatting (Prettier)
        run: npx prettier --check "**/*.{ts,tsx,json,md}"
        continue-on-error: true

      - name: Run Linter
        run: npx turbo run lint

     
      - name: Generate Prisma Client
        run: npm run prisma:generate --prefix nestjs-nutrigo-backend

      - name: Build Backend
        run: npx turbo run build --filter=nestjs-nutrigo-backend

     
      - name: Build Frontend
        run: npx turbo run build --filter=nextjs-nutrigo-frontend
     
      - name: Run All Tests (Jest)
        run: npx turbo run test
        env:
          JWT_SECRET: "test-secret"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/testdb"
